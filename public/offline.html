<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d3b48" />
    <title>離線中 | 多譯本聖經查詢</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(211, 161, 70, 0.18), transparent 28%),
          linear-gradient(180deg, #fcfaf5 0%, #f4efe3 100%);
        color: #1c2b38;
        font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
      }

      main {
        width: min(560px, calc(100% - 28px));
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 252, 245, 0.92);
        box-shadow: 0 24px 70px rgba(23, 42, 53, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.9rem;
      }

      p {
        margin: 0;
        line-height: 1.8;
        color: #5a6a75;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>目前離線中</h1>
      <p>App 外殼已經保留在裝置裡，但這次查詢需要網路或先前快取的資料。連上網後再重試，或回上一頁查看已載入過的內容。</p>
    </main>
  </body>
</html>
